---
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: sriov-dra-driver
  namespace: {{.Namespace}}
  annotations:
    kubernetes.io/description: |
      This DaemonSet launches the SR-IOV DRA (Dynamic Resource Allocation) driver on each node.
    release.openshift.io/version: "{{.ReleaseVersion}}"
spec:
  selector:
    matchLabels:
      app: sriov-dra-driver
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 33%
  template:
    metadata:
      labels:
        app: sriov-dra-driver
        component: network
        type: infra
        openshift.io/component: network
    spec:
      hostNetwork: true
      nodeSelector:
        {{- range $key, $value := .NodeSelectorField }}
          {{ $key }}: "{{ $value }}"
        {{- end }}
      tolerations:
      - operator: Exists
      serviceAccountName: sriov-dra-driver
      priorityClassName: "system-node-critical"
      {{- if .ImagePullSecrets }}
      imagePullSecrets:
      {{- range .ImagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      # Same wait-for-config pattern as sriov-device-plugin: init sets annotation on this pod,
      # config daemon removes it after SR-IOV config is applied (no kubectl or node annotation).
      initContainers:
      - name: sriov-dra-driver-init
        image: {{.SRIOVNetworkConfigDaemonImage}}
        command:
        - sriov-network-config-daemon
        - wait-for-config
        - --pod-name=$(POD_NAME)
        - --pod-namespace=$(POD_NAMESPACE)
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      containers:
      - name: sriov-dra-driver
        image: {{.SRIOVDRADriverImage}}
        command:
        - dra-driver-sriov
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CDI_ROOT
          value: {{.DRADriverCDIRoot}}
        - name: DEFAULT_INTERFACE_PREFIX
          value: {{.DRADriverDefaultInterfacePrefix}}
        - name: KUBELET_REGISTRAR_DIRECTORY_PATH
          value: /var/lib/kubelet/plugins_registry
        - name: KUBELET_PLUGINS_DIRECTORY_PATH
          value: /var/lib/kubelet/plugins
        - name: V
          value: "5"
        - name: NRI_PLUGIN_NAME
          value: "dra-driver-sriov"
        - name: NRI_PLUGIN_IDX
          value: "00"
        - name: HEALTHCHECK_PORT
          value: "-1"
        - name: CONFIGURATION_MODE
          value: "MULTUS"
        volumeMounts:
        - name: kubelet-plugins-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: kubelet-plugins
          mountPath: /var/lib/kubelet/plugins
        - name: cdi-root
          mountPath: {{.DRADriverCDIRoot}}
        - name: host-sys
          mountPath: /sys
        - name: host-dev
          mountPath: /dev
        - name: cri-socket
          mountPath: /var/run/nri/nri.sock
        - name: netns
          mountPath: /var/run/netns
          mountPropagation: HostToContainer
        - name: cni-results
          mountPath: /var/lib/cni
        - name: cni-bin
          mountPath: /opt/cni/bin
      volumes:
      - name: kubelet-plugins-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
      - name: kubelet-plugins
        hostPath:
          path: /var/lib/kubelet/plugins
          type: Directory
      - name: cdi-root
        hostPath:
          path: {{.DRADriverCDIRoot}}
          type: DirectoryOrCreate
      - name: host-sys
        hostPath:
          path: /sys
          type: Directory
      - name: host-dev
        hostPath:
          path: /dev
          type: Directory
      - name: cri-socket
        hostPath:
          path: /var/run/nri/nri.sock
          type: Socket
      - name: netns
        hostPath:
          path: /var/run/netns
          type: DirectoryOrCreate
      - name: cni-results
        hostPath:
          path: /var/lib/cni
          type: DirectoryOrCreate
      - name: cni-bin
        hostPath:
          path: {{.CNIBinPath}}
          type: DirectoryOrCreate
